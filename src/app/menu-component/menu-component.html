<nav class="nav">
  <a routerLink="/home" class="brand">Kaya</a>

  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/aboutMe" routerLinkActive="nav-active">Über mich</a>
    <a routerLink="/werdegang" routerLinkActive="nav-active">Werdegang</a>
    <a routerLink="/portfolio" routerLinkActive="nav-active">Portfolio</a>

  <div class="nav-right">
    <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="theme.isDark() ? 'Hellen Modus aktivieren' : 'Dunklen Modus aktivieren'">
      @if (theme.isDark()) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <a href="https://instagram.com" target="_blank" rel="noopener" class="nav-cta">
      Instagram
    </a>
  </div>
</nav>
